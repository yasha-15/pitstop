<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>~/auth/reset-password</title>
  <meta name="description" content="Reset your Track App password." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a0c10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      padding: 2rem;
    }
    .window {
      width: 100%;
      max-width: 440px;
      background: #111318;
      border-radius: 14px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 32px 80px rgba(0,0,0,0.7);
      overflow: hidden;
    }
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #161920;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .traffic-lights { display: flex; gap: 8px; }
    .dot { width: 13px; height: 13px; border-radius: 50%; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }
    .titlebar-title { font-size: 12px; color: #555c6e; }
    .titlebar-spacer { width: 55px; }
    .body { padding: 28px; }
    .section-label { font-size: 12px; color: #4ec9b0; margin-bottom: 8px; }
    .field { margin-bottom: 18px; }
    .input-wrap { position: relative; }
    .input-field {
      width: 100%;
      background: #1c2028;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 13px 44px 13px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #c9d1d9;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: #4ec9b0;
    }
    .input-field::placeholder { color: #404855; }
    .input-field:focus {
      border-color: rgba(78, 201, 176, 0.35);
      box-shadow: 0 0 0 3px rgba(78, 201, 176, 0.08);
    }
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #555c6e; font-size: 16px; padding: 0;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: #8b949e; }
    .strength-bar { height: 3px; background: #1c2028; border-radius: 99px; margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 99px; transition: width 0.3s, background 0.3s; width: 0%; }
    .strength-label { font-size: 11px; color: #555c6e; margin-top: 4px; }
    .btn-primary {
      width: 100%; padding: 14px;
      background: #1a4d2a; border: 1.5px solid #28c840; border-radius: 8px;
      color: #28c840; font-family: 'JetBrains Mono', monospace; font-size: 13px;
      cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.04em; position: relative;
    }
    .btn-primary:hover { background: #1f5c32; box-shadow: 0 0 16px rgba(40,200,64,0.15); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary.loading::after {
      content: ''; position: absolute; right: 16px; top: 50%; width: 14px; height: 14px;
      margin-top: -7px; border: 2px solid rgba(40,200,64,0.3); border-top-color: #28c840;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert {
      display: none; padding: 12px 14px; border-radius: 8px;
      font-size: 12px; margin-bottom: 16px; border: 1px solid;
      animation: fadeIn 0.2s ease;
    }
    .alert.error   { background: #2d1a1a; border-color: rgba(255,95,87,0.3);  color: #ff8080; }
    .alert.success { background: #1a2d1a; border-color: rgba(40,200,64,0.3);  color: #6ee67e; }
    .alert.show    { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .page-title { font-size: 13px; color: #4ec9b0; margin-bottom: 6px; }
    .page-desc { color: #8b949e; font-size: 12px; margin-bottom: 22px; line-height: 1.6; }
    .btn-ghost {
      background: none; border: none; color: #4d9fec;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      cursor: pointer; padding: 0; text-decoration: underline;
      text-underline-offset: 3px; transition: color 0.2s;
    }
    .btn-ghost:hover { color: #74b9ff; }
    #invalid-state { text-align: center; padding: 10px 0; }
    #invalid-state .icon { font-size: 36px; margin-bottom: 12px; }
    #invalid-state p { color: #555c6e; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="traffic-lights">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <span class="titlebar-title">~/auth/reset-password</span>
    <div class="titlebar-spacer"></div>
  </div>

  <div class="body">
    <div id="invalid-state" style="display:none;">
      <div class="icon">🔗</div>
      <p id="invalid-msg">This reset link is invalid or has expired.</p>
      <a href="/auth.html" class="btn-ghost">← back to login</a>
    </div>

    <div id="reset-form">
      <div class="page-title">// reset password</div>
      <p class="page-desc">Choose a new password for your account. Make it strong!</p>

      <div class="alert" id="r-alert"></div>

      <div class="field">
        <div class="section-label">// new password</div>
        <div class="input-wrap">
          <input id="new-password" class="input-field" type="password" placeholder="min. 8 characters..." oninput="checkStrength(this.value)" />
          <button class="eye-btn" onclick="togglePwd('new-password', this)">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>

      <div class="field">
        <div class="section-label">// confirm password</div>
        <div class="input-wrap">
          <input id="confirm-password" class="input-field" type="password" placeholder="repeat your password..." />
          <button class="eye-btn" onclick="togglePwd('confirm-password', this)">👁</button>
        </div>
      </div>

      <button class="btn-primary" id="reset-btn" onclick="doReset()">set new password →</button>
    </div>
  </div>
</div>

<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('reset-form').style.display   = 'none';
    document.getElementById('invalid-state').style.display = 'block';
    document.getElementById('invalid-msg').textContent     = 'No reset token found. Please request a new password reset link.';
  }

  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    inp.type  = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  function checkStrength(v) {
    const fill  = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    if (!v) { fill.style.width = '0%'; label.textContent = ''; return; }
    let score = 0;
    if (v.length >= 8)        score++;
    if (v.length >= 12)       score++;
    if (/[A-Z]/.test(v))      score++;
    if (/[0-9]/.test(v))      score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const color = score <= 1 ? '#ff5f57' : score <= 3 ? '#febc2e' : '#28c840';
    const text  = score <= 1 ? 'weak' : score <= 3 ? 'moderate' : 'strong';
    fill.style.width      = Math.min(100, score * 20) + '%';
    fill.style.background = color;
    label.textContent     = `strength: ${text}`;
    label.style.color     = color;
  }

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('r-alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
  }

  async function doReset() {
    const password = document.getElementById('new-password').value;
    const confirm  = document.getElementById('confirm-password').value;
    if (!password)            return showAlert('Please enter a new password.');
    if (password.length < 8)  return showAlert('Password must be at least 8 characters.');
    if (password !== confirm)  return showAlert('Passwords do not match.');

    const btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res  = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      showAlert('Password reset successfully! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/auth.html', 1500);
    } catch (err) {
      showAlert(err.message);
      // Show invalid state for expired/used tokens
      if (err.message.includes('expired') || err.message.includes('Invalid')) {
        setTimeout(() => {
          document.getElementById('reset-form').style.display    = 'none';
          document.getElementById('invalid-state').style.display = 'block';
        }, 1500);
      }
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  ['new-password','confirm-password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
  });
</script>
</body>
</html>
